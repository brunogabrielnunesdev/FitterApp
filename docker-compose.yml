services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fitterapp}
      POSTGRES_USER: ${POSTGRES_USER:-fitterapp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fitterapp-local}
    ports:
      - "5432:5432"
    volumes:
      - fitterapp_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  mailpit:
    image: axllent/mailpit:v1.27
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  fitterapp_postgres_data:

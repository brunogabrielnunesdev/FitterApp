spring:
  application:
    name: api
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/fitterapp}
    username: ${POSTGRES_USER:fitterapp}
    password: ${POSTGRES_PASSWORD:fitterapp-local}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}

fitterapp:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  jwt:
    secret: ${JWT_SECRET:fitterapp-local-secret-with-at-least-32-bytes}
    issuer: ${JWT_ISSUER:fitterapp-api}
    access-token-duration: ${JWT_ACCESS_TOKEN_DURATION:15m}
  email:
    from: ${MAIL_FROM:no-reply@fitterapp.local}
    confirmation-url: ${EMAIL_CONFIRMATION_URL:http://localhost:5173/confirmar-email}
